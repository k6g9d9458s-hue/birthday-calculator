<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>добавлен слайдер изображения</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        text-align: center;
        margin-top: 30px;
    }
    .slider {
        width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border: 3px solid #ccc;
        border-radius: 10px;
    }
    button {
        padding: 10px 20px;
        margin: 15px;
        border: none;
        border-radius: 8px;
        background-color: #4CAF50;
        color: white;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background-color: #45a049;
    }
    #counter {
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>
<body>
<div class="slider">
<img id="slide" src="https://picsum.photos/id/237/500/300" alt="Изображение">
<p id="counter"></p>
<button id="prev">Назад</button>
<button id="next">Вперед</button>
</div>
<script>
const images = [
    "https://picsum.photos/id/237/500/300",
    "https://picsum.photos/id/238/500/300",
    "https://picsum.photos/id/239/500/300",
    "https://picsum.photos/id/240/500/300",
    "https://picsum.photos/id/241/500/300"
];
let currentIndex = 0;
const slide = document.getElementById("slide");
const counter = document.getElementById("counter");
function showImage() {
    slide.src = images[currentIndex];
    counter.textContent =
        Изображение ${currentIndex + 1} из ${images.length};
}
document.getElementById("next").addEventListener("click", function () {
    currentIndex++;
    if (currentIndex >= images.length) {
        currentIndex = 0;
    }
    showImage();
});
document.getElementById("prev").addEventListener("click", function () {
    currentIndex--;
    if (currentIndex < 0) {
        currentIndex = images.length - 1;
    }
    showImage();
});
showImage();
</script>
</body>
</html>
